name: "Parkinson Moderate"
description: "중등도 파킨슨병. 전신 강직(rigidity) + 안정 시 떨림(rest tremor)."
injury_type: "parkinson"

metadata:
  hoehn_yahr: 2.5
  notes: "강직은 속도 무관(lead-pipe), k_passive로 모델링. 떨림 4-6Hz 안정시. 경직(spasticity)은 0."

joint_params:
  # 하체: 강직 + 보행 동결 경향
  L_Hip:
    tau_active: 0.7
    k_passive: 10.0   # 강직 (속도 무관)
    b_passive: 4.0
    spasticity: 0.0    # 파킨슨은 경직이 아님
    spas_dir: 0.0
    rom_scale: 0.85
    k_endstop: 3.0
    tremor_amp: 1.0
    tremor_freq: 5.0
  L_Knee:
    tau_active: 0.7
    k_passive: 10.0
    b_passive: 4.0
    spasticity: 0.0
    spas_dir: 0.0
    rom_scale: 0.85
    k_endstop: 3.0
    tremor_amp: 1.5
    tremor_freq: 5.0
  L_Ankle_Toe:
    tau_active: 0.7
    k_passive: 8.0
    b_passive: 3.5
    spasticity: 0.0
    spas_dir: 0.0
    rom_scale: 0.9
    k_endstop: 2.0
    tremor_amp: 1.0
    tremor_freq: 5.0
  R_Hip:
    tau_active: 0.7
    k_passive: 10.0
    b_passive: 4.0
    spasticity: 0.0
    spas_dir: 0.0
    rom_scale: 0.85
    k_endstop: 3.0
    tremor_amp: 1.0
    tremor_freq: 5.0
  R_Knee:
    tau_active: 0.7
    k_passive: 10.0
    b_passive: 4.0
    spasticity: 0.0
    spas_dir: 0.0
    rom_scale: 0.85
    k_endstop: 3.0
    tremor_amp: 1.5
    tremor_freq: 5.0
  R_Ankle_Toe:
    tau_active: 0.7
    k_passive: 8.0
    b_passive: 3.5
    spasticity: 0.0
    spas_dir: 0.0
    rom_scale: 0.9
    k_endstop: 2.0
    tremor_amp: 1.0
    tremor_freq: 5.0

  # 상체: 강직 + 떨림 (상지가 더 심함)
  Upper_L:
    tau_active: 0.65
    k_passive: 12.0
    b_passive: 5.0
    spasticity: 0.0
    spas_dir: 0.0
    rom_scale: 0.8
    k_endstop: 3.0
    tremor_amp: 3.0    # 손/팔 떨림 가장 심함
    tremor_freq: 5.0
  Upper_R:
    tau_active: 0.65
    k_passive: 12.0
    b_passive: 5.0
    spasticity: 0.0
    spas_dir: 0.0
    rom_scale: 0.8
    k_endstop: 3.0
    tremor_amp: 3.0
    tremor_freq: 5.0
