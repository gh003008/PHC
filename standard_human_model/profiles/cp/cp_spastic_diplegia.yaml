name: "CP Spastic Diplegia"
description: "경직형 양하지마비 뇌성마비. 양쪽 하지 경직, 상체 경미."
injury_type: "cerebral_palsy"

metadata:
  gmfcs_level: 3  # Walks with assistive device
  type: "spastic_diplegia"
  notes: "양쪽 하지 대칭적 경직. 가위걸음(scissor gait) 경향. 상체는 경미한 영향."

joint_params:
  # 상체: 경미한 영향
  Upper_L:
    tau_active: 0.85
    k_passive: 4.0
    b_passive: 2.0
    spasticity: 2.0
    spas_dir: 0.0
    rom_scale: 0.9
    k_endstop: 2.0
    tremor_amp: 0.0
    tremor_freq: 0.0
  Upper_R:
    tau_active: 0.85
    k_passive: 4.0
    b_passive: 2.0
    spasticity: 2.0
    spas_dir: 0.0
    rom_scale: 0.9
    k_endstop: 2.0
    tremor_amp: 0.0
    tremor_freq: 0.0

