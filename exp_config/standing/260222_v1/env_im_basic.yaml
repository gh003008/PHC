project_name: "PHC_Basic_Baseline"
notes: "Pure PHC Single Primitive Standing Task - Strict Structure"

disable_multiprocessing: False

env:
  motion_file: "sample_data/amass_isaac_standing_upright_slim.pkl"
  num_envs: 512
  numEnvs: 512
  env_spacing: 5
  envSpacing: 5
  episode_length: 300
  episodeLength: 300
  is_flag_run: False
  enable_debug_vis: False

  fut_tracks: False
  self_obs_v: 1
  obs_v: 6

  kp_scale: 1
  power_reward: True
  control_mode: "isaac_pd"
  power_scale: 1.0
  controlFrequencyInv: 2 # 30 Hz
  stateInit: "Random"  
  hybridInitProb: 0.5
  numAMPObsSteps: 10

  local_root_obs: True
  root_height_obs: True
  key_bodies: ["R_Ankle", "L_Ankle", "R_Wrist", "L_Wrist"]
  contact_bodies: ["R_Ankle", "L_Ankle", "R_Toe", "L_Toe"]
  reset_bodies: ['Pelvis', 'L_Hip', 'L_Knee', 'R_Hip', 'R_Knee', 'Torso', 'Spine', 'Chest', 'Neck', 'Head', 'L_Thorax', 'L_Shoulder', 'L_Elbow', 'L_Wrist', 'L_Hand', 'R_Thorax', 'R_Shoulder', 'R_Elbow', 'R_Wrist', 'R_Hand']
  terminationHeight: 0.15
  enableEarlyTermination: True
  terminationDistance: 0.25

  numTrajSamples: 3
  trajSampleTimestepInv: 3
  enableTaskObs: True

  plane:
    staticFriction: 1.0
    dynamicFriction: 1.0
    restitution: 0.0

######## PNN Configs (Disabled for Single Primitive) ########
has_pnn: False
fitting: False
num_prim: 1
models: []

robot:
  humanoid_type: smpl
  asset:
    assetRoot: "/"
    assetFileName: "mjcf/smpl_humanoid.xml"

control:
  control_mode: "isaac_pd"
  powerScale: 1.0
  action_scale: 0.5

domain_rand:
  has_domain_rand: False

sim:
  substeps: 2
  physx:
    step_dt: "1.0 / 60.0"
    num_threads: 4
    solver_type: 1
    num_position_iterations: 4
    num_velocity_iterations: 0
    contact_offset: 0.02
    rest_offset: 0.0
    bounce_threshold_velocity: 0.2
    max_depenetration_velocity: 10.0
    default_buffer_size_multiplier: 10.0
  flex:
    num_inner_iterations: 10
    warm_start: 0.25
