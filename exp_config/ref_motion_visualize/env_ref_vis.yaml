project_name: "PHC_Walk_Baseline"
notes: "Reference Motion Visualization - Early termination disabled"

disable_multiprocessing: False

env:
  motion_file: "sample_data/amass_S009_08mps_10s.pkl"
  num_envs: 512
  numEnvs: 512
  env_spacing: 5
  envSpacing: 5
  episode_length: 5000
  episodeLength: 5000
  is_flag_run: False
  enable_debug_vis: False

  fut_tracks: False
  obs_v: 6
  auto_pmcp: False
  auto_pmcp_soft: True

  ######## PNN Configs ########
  has_pnn: False
  fitting: False
  num_prim: 1
  training_prim: 0
  actors_to_load: 0
  has_lateral: False

  ######## Getup Configs ########
  zero_out_far: True
  zero_out_far_train: False
  cycle_motion: False
  getup_udpate_epoch: 1000
  getup_schedule: False
  recoverySteps: 90
  zero_out_far_steps: 90
  recoveryEpisodeProb: 0.0
  fallInitProb: 0.0
  hard_negative: False

  z_activation: "silu"
  kp_scale: 1
  power_reward: True
  power_coefficient: 0.000005
  shape_resampling_interval: 500

  controlFrequencyInv: 2  # 30 Hz
  # VIC (Variable Impedance Control) Settings
  vic_enabled: True
  vic_curriculum_stage: 2 # Stage 1: Fixed CCF, Stage 2: Learnable CCF
  vic_metabolic_reward_w: 0.01
  vic_ccf_min: -1.0 # 0.5x stiffness
  vic_ccf_max: 1.0  # 2.0x stiffness
  # VIC: CCF Grouping (8 groups: L_hip, L_knee, L_ankle, R_hip, R_knee, R_ankle, upper_left, upper_right)
  vic_ccf_num_groups: 8
  # VIC: CCF sigma override (log-std, -1.0 => std=0.37 vs PD default -2.9 => std=0.055)
  vic_ccf_sigma_init: -1.0
  # VIC: Phase observation (sin/cos encoding of motion phase, +2 obs dims)
  vic_phase_obs: True
  # VIC: Reward Weight Curriculum (epoch < switch_epoch: task-heavy, epoch >= switch_epoch: disc-heavy)
  reward_curriculum_switch_epoch: 10000
  reward_w_stage1_task: 0.7
  reward_w_stage1_disc: 0.3
  reward_w_stage2_task: 0.3
  reward_w_stage2_disc: 0.7

  stateInit: "Default"
  hybridInitProb: 0.5
  numAMPObsSteps: 10

  local_root_obs: True
  root_height_obs: True
  key_bodies: ["R_Ankle", "L_Ankle", "R_Wrist", "L_Wrist"]
  contact_bodies: ["R_Ankle", "L_Ankle", "R_Toe", "L_Toe"]
  reset_bodies: ['Pelvis', 'L_Hip', 'L_Knee', 'R_Hip', 'R_Knee', 'Torso', 'Spine',
                 'Chest', 'Neck', 'Head', 'L_Thorax', 'L_Shoulder', 'L_Elbow',
                 'L_Wrist', 'L_Hand', 'R_Thorax', 'R_Shoulder', 'R_Elbow', 'R_Wrist', 'R_Hand']
  terminationHeight: 0.0
  enableEarlyTermination: False
  terminationDistance: 10.0

  numTrajSamples: 3
  trajSampleTimestepInv: 3
  enableTaskObs: True
  trackBodies: ["R_Ankle", "L_Ankle", "R_Wrist", "L_Wrist"]
  reward_specs:
    k_pos: 200
    k_rot: 10
    k_vel: 1.0
    k_ang_vel: 0.1
    w_pos: 0.4
    w_rot: 0.3
    w_vel: 0.2
    w_ang_vel: 0.1

  plane:
    staticFriction: 1.0
    dynamicFriction: 1.0
    restitution: 0.0

robot:
  humanoid_type: smpl
  asset:
    assetRoot: "/"
    assetFileName: "mjcf/smpl_humanoid.xml"

control:
  control_mode: "pd"
  powerScale: 1.0
  action_scale: 0.5

domain_rand:
  has_domain_rand: False

sim:
  substeps: 2
  physx:
    step_dt: "1.0 / 60.0"
    num_threads: 4
    solver_type: 1
    num_position_iterations: 4
    num_velocity_iterations: 0
    contact_offset: 0.02
    rest_offset: 0.0
    bounce_threshold_velocity: 0.2
    max_depenetration_velocity: 10.0
    default_buffer_size_multiplier: 10.0
  flex:
    num_inner_iterations: 10
    warm_start: 0.25
